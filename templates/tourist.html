<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>景区AI数字人导游</title>
    <!-- 引入Bootstrap简化样式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="container mt-4">
    <div class="row">
        <!-- 左侧数字人展示区域 -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">数字导游形象</div>
                <div class="card-body text-center">
                    <img id="humanAvatar" src="/static/images/human_face/base.png" width="350">
                    <div class="mt-3">
                        <span id="humanStatus" class="text-success">待机中</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧对话交互区 -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header">和导游对话</div>
                <div class="card-body chat-box overflow-auto" style="height:400px;" id="chatBox">
                    <div class="ai-message">你好，我是景区智能导游，有什么想了解的景点信息吗？</div>
                </div>
                <div class="card-footer d-flex gap-2">
                    <textarea id="userInput" class="form-control" placeholder="输入你的问题"></textarea>
                    <button id="voiceBtn" class="btn btn-info">语音输入</button>
                    <button id="sendBtn" class="btn btn-primary">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/tourist.js"></script>
</body>
</html>
