<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵山景区AI导游</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
.container { width: 420px; background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
h1 { text-align: center; color: #333; margin-bottom: 20px; font-size: 22px; }
.character-img { width: 120px; display: block; margin: 0 auto 20px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.tag-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; justify-content: center; }
.tag-btn { padding: 6px 14px; border: 2px solid #667eea; border-radius: 20px; background: #fff; color: #667eea; cursor: pointer; font-size: 13px; transition: all 0.3s; }
.tag-btn.active { background: #667eea; color: #fff; }
.chat-box { height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; background: #fafafa; }
.msg { margin-bottom: 10px; padding: 10px 14px; border-radius: 12px; max-width: 85%; font-size: 14px; line-height: 1.5; }
.msg-user { background: #667eea; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
.msg-ai { background: #fff; color: #333; border: 1px solid #eee; border-bottom-left-radius: 4px; }
.input-area { display: flex; gap: 8px; }
.input-area input { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; outline: none; }
.input-area input:focus { border-color: #667eea; }
.input-area button { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; color: #fff; transition: opacity 0.3s; }
.btn-send { background: #667eea; }
.btn-voice { background: #f093fb; }
.btn-recommend { background: #4facfe; width: 100%; margin-top: 8px; padding: 10px; border: none; border-radius: 10px; color: #fff; cursor: pointer; font-size: 14px; }
.btn-send:hover, .btn-voice:hover, .btn-recommend:hover { opacity: 0.85; }
.audio-player { margin-top: 8px; }
.audio-player audio { width: 100%; height: 32px; }
.loading { text-align: center; color: #999; font-size: 13px; padding: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>️ 灵山景区AI导游</h1>
  <img src="/static/picture.png" class="character-img" alt="数字人">
  <div class="tag-selector">
    <span class="tag-btn active" data-tag="通用游客">通用</span>
    <span class="tag-btn" data-tag="历史爱好者">历史</span>
    <span class="tag-btn" data-tag="自然风光爱好者">自然</span>
    <span class="tag-btn" data-tag="文化探索者">文化</span>
    <span class="tag-btn" data-tag="亲子游客">亲子</span>
  </div>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendText()">
    <button class="btn-send" onclick="sendText()">发送</button>
    <button class="btn-voice" onclick="document.getElementById('audioInput').click()">🎤</button>
    <input type="file" id="audioInput" accept="audio/*" style="display:none" onchange="sendVoice(this)">
  </div>
  <button class="btn-recommend" onclick="getRecommend()">🗺️ 个性化路线推荐</button>
</div>

<script>
let currentTag = '通用游客';
document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTag = btn.dataset.tag;
  };
});

function addMsg(text, type) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg ' + (type === 'user' ? 'msg-user' : 'msg-ai');
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function addAudio(url) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg msg-ai audio-player';
  div.innerHTML = `<audio controls src="/api/common/${url.split('/').pop()}"></audio>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showLoading() {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'loading'; div.id = 'loadingMsg'; div.textContent = '导游思考中...';
  box.appendChild(div); box.scrollTop = box.scrollHeight;
}
function hideLoading() { const el = document.getElementById('loadingMsg'); if(el) el.remove(); }

async function sendText() {
  const input = document.getElementById('userInput');
  const q = input.value.trim();
  if (!q) return;
  addMsg(q, 'user'); input.value = '';
  showLoading();
  try {
    const res = await fetch('/api/tourist/text_chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({question: q, tag: currentTag})
    });
    const data = await res.json();
    hideLoading();
    if (data.code === 200) {
      addMsg(data.data.answer, 'ai');
      addAudio(data.data.audio_url);
    } else { addMsg('出错了：' + data.msg, 'ai'); }
  } catch(e) { hideLoading(); addMsg('网络错误', 'ai'); }
}

async function sendVoice(input) {
  if (!input.files[0]) return;
  addMsg('🎤 语音消息', 'user');
  showLoading();
  const fd = new FormData();
  fd.append('audio', input.files[0]);
  fd.append('tag', currentTag);
  try {
    const res = await fetch('/api/tourist/voice_chat', {method:'POST', body: fd});
    const data = await res.json();
    hideLoading();
    if (data.code === 200) {
      addMsg('识别：' + data.data.question, 'user');
      addMsg(data.data.answer, 'ai');
      addAudio(data.data.audio_url);
    } else { addMsg('语音识别失败', 'ai'); }
  } catch(e) { hideLoading(); addMsg('网络错误', 'ai'); }
  input.value = '';
}

async function getRecommend() {
  addMsg(`🗺️ 请为「${currentTag}」推荐路线`, 'user');
  showLoading();
  try {
    const res = await fetch('/api/tourist/recommend', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({tag: currentTag})
    });
    const data = await res.json();
    hideLoading();
    if (data.code === 200) { addMsg(data.data.answer, 'ai'); addAudio(data.data.audio_url); }
    else { addMsg('推荐失败', 'ai'); }
  } catch(e) { hideLoading(); addMsg('网络错误', 'ai'); }
}
</script>
</body>
</html>
