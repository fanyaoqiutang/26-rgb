<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数字人形象配置</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">数字人导游配置</span>
            <a href="/admin" class="btn btn-outline-light">返回首页</a>
        </div>
    </nav>
    <div class="container mt-4 row gap-4">
        <div class="col-md-5">
            <div class="card text-center">
                <div class="card-header">当前导游形象预览</div>
                <div class="card-body">
                    <img id="previewImg" src="/static/images/human_face/base.png" width="320">
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">配置参数</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label>形象名称</label>
                        <input class="form-control" id="humanName" value="默认导游形象">
                    </div>
                    <div class="mb-3">
                        <label>TTS音色</label>
                        <select class="form-select" id="voiceType">
                            <option value="zh-XiaoxiaoNeural">晓晓（温柔女声）</option>
                            <option value="zh-YunyangNeural">云阳（稳重男声）</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>服装风格描述</label>
                        <input class="form-control" id="costumeStyle" placeholder="古风汉服/现代休闲导游服">
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="isDefault" checked>
                        <label class="form-check-label">设为默认启用导游</label>
                    </div>
                    <button class="btn btn-success w-100" id="saveHumanBtn">保存配置</button>
                </div>
            </div>
        </div>
    </div>
<script src="/static/js/api.js"></script>
<script src="/static/js/admin.js"></script>
</body>
</html>
