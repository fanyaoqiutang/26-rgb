<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>运营数据大屏</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">景区运营数据统计大屏</span>
            <a href="/admin" class="btn btn-outline-light">返回首页</a>
        </div>
    </nav>
    <div class="container mt-4">
        <!-- 核心指标卡片 -->
        <div class="row mb-4 gap-3">
            <div class="col-md-3 card p-3 text-center">
                <h5>今日对话总次数</h5>
                <h2 id="todayChatCount">0</h2>
            </div>
            <div class="col-md-3 card p-3 text-center">
                <h5>累计交互游客</h5>
                <h2 id="totalUserCount">0</h2>
            </div>
            <div class="col-md-3 card p-3 text-center">
                <h5>知识库知识点总数</h5>
                <h2 id="kbTotal">0</h2>
            </div>
        </div>
        <!-- 图表区域 -->
        <div class="row gap-4">
            <div class="col-md-6 card p-3">
                <h5>近7日对话趋势</h5>
                <canvas id="chatTrendChart"></canvas>
            </div>
            <div class="col-md-6 card p-3">
                <h5>游客情感分布</h5>
                <canvas id="emotionPieChart"></canvas>
            </div>
        </div>
    </div>
<script src="/static/js/api.js"></script>
<script src="/static/js/admin.js"></script>
</body>
</html>
